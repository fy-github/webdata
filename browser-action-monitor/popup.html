<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Action Monitor</title>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #1d4ed8;
      --accent: #10b981;
      --danger: #ef4444;
      --panel: #fff;
      --border: #dbe5f0;
      --text: #0f172a;
      --muted: #64748b;
      --bg: linear-gradient(180deg, #eef5ff 0%, #f8fafc 100%);
      --off: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 360px;
      margin: 0;
      padding: 18px;
      font-family: "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .status {
      display: grid;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #eff6ff;
      margin-bottom: 16px;
    }

    .status-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 8px;
    }

    .status-main,
    .pill {
      min-height: 34px;
      padding: 8px 10px;
      border: 1px solid rgba(219, 229, 240, 0.9);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
    }

    .status-main {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.16);
    }

    .dot.paused {
      background: var(--off);
      box-shadow: 0 0 0 6px rgba(148, 163, 184, 0.16);
    }

    .pill {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 600;
    }

    .attachment-status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 8px 10px;
      border: 1px solid rgba(219, 229, 240, 0.9);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
    }

    .status-chip.metric {
      color: var(--muted);
    }

    .status-dot {
      flex: 0 0 auto;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--off);
    }

    .status-dot.is-on {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
    }

    .status-dot.is-off {
      background: var(--off);
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.14);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8fbff;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 600;
      word-break: break-all;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .secondary {
      background: #e2e8f0;
      color: var(--text);
    }

    .success {
      background: var(--accent);
      color: #fff;
    }

    .warning {
      background: #f59e0b;
      color: #fff;
    }

    .danger {
      background: var(--danger);
      color: #fff;
    }

    .meta {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Browser Action Monitor</h1>
    <div class="status">
      <div class="status-bar">
        <div class="status-main"><span class="dot" id="statusDot"></span><span id="statusText">记录中</span></div>
        <span class="pill" id="syncBadge">仅本地模式</span>
      </div>
      <div class="attachment-status" id="attachmentStatus">附件状态加载中...</div>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-label">会话 ID</span><span class="stat-value" id="sessionId">-</span></div>
      <div class="stat"><span class="stat-label">动作数量</span><span class="stat-value" id="actionCount">0</span></div>
      <div class="stat"><span class="stat-label">开始时间</span><span class="stat-value" id="startedAt">-</span></div>
      <div class="stat"><span class="stat-label">同步状态</span><span class="stat-value" id="syncSummary">-</span></div>
    </div>
    <div class="actions">
      <div class="row"><button class="success" id="startBtn">开始记录</button><button class="warning" id="pauseBtn">暂停记录</button></div>
      <div class="row"><button class="primary" id="recordsBtn">查看记录</button><button class="secondary" id="settingsBtn">打开设置</button></div>
      <div class="row"><button class="primary" id="exportBtn">导出本地 JSON</button><button class="secondary" id="exportAgentJsonBtn">导出 Agent JSON</button></div>
      <div class="row"><button class="secondary" id="exportAgentZipBtn">导出 Agent ZIP</button><button class="secondary" id="retrySyncBtn">立即同步</button></div>
      <div class="row"><button class="secondary" id="newSessionBtn">新建会话</button><button class="danger" id="clearBtn">清空数据</button></div>
    </div>
    <div class="meta" id="feedback"></div>
  </div>
  <script type="module" src="./src/ui/popup.js"></script>
</body>
</html>
